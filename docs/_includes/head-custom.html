<script type="application/ld+json">

  "@context": "https://schema.org",

    {
      "@type": "Question",
      "name": "How do I import an n8n template?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Download the JSON file, then in n8n go to Workflows > Import from File and select the JSON. Configure your credentials and activate."
      }
    },
    {
      "@type": "Question",
      "name": "What is n8n?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "n8n is an open-source workflow automation platform similar to Zapier and Make, but self-hostable and free. It connects 400+ apps through a visual node-based editor."
      }
    },
    {
      "@type": "Question",
      "name": "Are these templates free?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Yes, all 280+ templates in this repository are free and open-source under the CC-BY-4.0 license."
      }
    },
    {
      "@type": "Question",
      "name": "What platforms are covered?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Gmail, Telegram, Slack, Discord, WhatsApp, Google Drive, Google Sheets, Notion, Airtable, WordPress, Instagram, Twitter, OpenAI, and many more."
      }
    },
    {
      "@type": "Question",
      "name": "What AI integrations are available?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Templates cover OpenAI GPT-4, Claude, Gemini, DeepSeek, LangChain, vector stores (Pinecone, Supabase, Qdrant), and RAG chatbot architectures."
      }
    }
  ]
}
</script>
