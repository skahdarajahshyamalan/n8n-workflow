title: "Awesome n8n Templates"
description: "The largest curated collection of 280+ free n8n automation workflow templates. AI agents, RAG chatbots, email automation, social media, DevOps, and more."
url: "https://enescingoz.github.io"
baseurl: "/awesome-n8n-templates"

remote_theme: pages-themes/minimal@v0.2.0

plugins:
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-remote-theme

author:
  name: "Enes Cingoz"
  url: "https://github.com/enescingoz"

github:
  repository_url: "https://github.com/enescingoz/awesome-n8n-templates"

social:
  name: "Enes Cingoz"
  links:
    - "https://github.com/enescingoz"

twitter:
  card: "summary_large_image"

defaults:
  - scope:
      path: ""
    values:
      layout: "default"
      image: "https://repository-images.githubusercontent.com/enescingoz/awesome-n8n-templates"

exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
